<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Película</title>
    <style>
        body {
            background-color: #141414;
            color: #e5e5e5;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 40px;
        }

        .btn-volver {
            display: inline-block;
            background-color: #E50914;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 30px;
            transition: background-color 0.2s;
        }

        .btn-volver:hover {
            background-color: #b20710;
        }

        .contenedor-detalle {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            background-color: #181818;
            padding: 30px;
            border-radius: 10px;
        }

        .columna-izq {
            flex: 1;
            min-width: 250px;
            max-width: 350px;
        }

        .columna-izq img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
        }

        .columna-der {
            flex: 2;
            min-width: 300px;
        }

        h1 {
            color: white;
            margin-top: 0;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .datos-tecnicos {
            font-size: 1.1em;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .etiqueta {
            color: #E50914;
            font-weight: bold;
        }

        .sinopsis-texto {
            line-height: 1.6;
            margin-bottom: 25px;
        }

        ul {
            padding-left: 20px;
            color: #d1d1d1;
            margin-top: 5px;
        }

        /* ESTILOS DE LA CAJA DE MENSAJE Y ENLACE */
        .caja-mensaje {
            background-color: #1a242f; 
            border-left: 4px solid #E50914; 
            padding: 20px;
            margin: 30px 0;
            border-radius: 4px;
            font-size: 1.2em;
            text-align: center;
            color: #d1d5db;
        }

        .enlace-ver {
            color: #E50914;
            font-weight: bold;
            text-decoration: none;
            font-size: 1.1em;
            display: inline-block;
            margin-top: 10px;
        }

        .enlace-ver:hover {
            text-decoration: underline;
            color: #ff1a25;
        }

        .trailer-contenedor {
            margin-top: 10px;
        }

        iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            border: none;
            border-radius: 8px;
        }

        /* --- NUEVOS ESTILOS PARA SERIES Y CAPÍTULOS --- */
        .seccion-series {
            width: 100%;
            margin-top: 30px;
            border-top: 2px solid #333;
            padding-top: 30px;
        }

        .selector-temporada {
            background-color: #1a242f;
            color: white;
            border: 1px solid #E50914;
            padding: 10px 20px;
            font-size: 1.1em;
            border-radius: 4px;
            cursor: pointer;
            margin-bottom: 20px;
            outline: none;
        }

        .grid-capitulos {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .capitulo-card {
            background: #222;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .capitulo-card:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4);
            z-index: 10;
        }

        .capitulo-card video {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            display: block;
            background-color: #000;
        }

        .info-capitulo {
            padding: 15px;
        }

        .info-capitulo strong {
            color: white;
            display: block;
            margin-bottom: 5px;
        }

        .overlay-descripcion {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: calc(100% - 50px); /* Deja libre la zona del título */
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 0.3s;
            font-size: 0.9em;
            color: #d1d5db;
            pointer-events: none;
            text-align: center;
        }

        .capitulo-card:hover .overlay-descripcion {
            opacity: 1;
        }
    </style>
</head>
<body>

    <a href="index.html" class="btn-volver">← Volver al catálogo</a>

    <div id="contenido" class="contenedor-detalle">
    </div>

    <script>
        const parametros = new URLSearchParams(window.location.search);
        const tituloBuscado = parametros.get('titulo');

        // ✅ AÑADIDO: Sistema anti-caché para forzar la carga del JSON más reciente
        fetch('peliculas.json?v=' + new Date().getTime())
            .then(respuesta => respuesta.json())
            .then(peliculas => {
                const peli = peliculas.find(p => p.titulo === tituloBuscado);
                const contenedor = document.getElementById('contenido');

                if (peli) {
                    let urlEmbed = "";
                    let trailerHTML = "<p>Tráiler no disponible</p>"; 
                    
                    if (peli.trailer) {
                        urlEmbed = peli.trailer;
                        if (urlEmbed.includes('watch?v=')) {
                            urlEmbed = urlEmbed.replace('watch?v=', 'embed/');
                        } else if (urlEmbed.includes('youtu.be/')) {
                            urlEmbed = urlEmbed.replace('youtu.be/', 'youtube.com/embed/');
                        }
                        urlEmbed = urlEmbed.split('&')[0].split('?si=')[0];
                        trailerHTML = `<iframe src="${urlEmbed}" allowfullscreen></iframe>`;
                    }

                    let listaActores = "<li>No hay reparto disponible</li>";
                    if (peli.actores) {
                        listaActores = peli.actores.split(',').map(actor => `<li>${actor.trim()}</li>`).join('');
                    }

                    const directorPeli = peli.director ? peli.director.toUpperCase() : "Desconocido";
                    const generoPeli = peli.genero ? peli.genero.toUpperCase() : "No especificado";
                    const duracionPeli = peli.duracion ? peli.duracion : "No especificada";
                    const sinopsisPeli = peli.sinopsis ? peli.sinopsis : "Sinopsis no disponible.";
                    
                    const enlaceVideo = peli.url_video;

                    contenedor.innerHTML = `
                        <div class="columna-izq">
                            <img src="${peli.caratula}" alt="Carátula de ${peli.titulo}">
                        </div>
                        <div class="columna-der">
                            <h1>${peli.titulo}</h1>
                            
                            <div class="datos-tecnicos">
                                <p><span class="etiqueta">Director:</span> ${directorPeli}</p>
                                <p><span class="etiqueta">Género:</span> ${generoPeli}</p>
                                <p><span class="etiqueta">Duración:</span> ${duracionPeli}</p>
                            </div>
                            
                            <div class="sinopsis-texto">
                                <span class="etiqueta">Sinopsis:</span> <br> ${sinopsisPeli}
                            </div>
                            
                            <div>
                                <span class="etiqueta">Actores:</span>
                                <ul>${listaActores}</ul>
                            </div>

                            <div id="caja-estreno" class="caja-mensaje">
                                ⏳ El enlace principal estará disponible en <strong id="contador-estreno" style="color: white;">5</strong> segundos...
                            </div>

                            <div class="trailer-contenedor">
                                <span class="etiqueta">Tráiler:</span> <br><br>
                                ${trailerHTML}
                            </div>
                        </div>
                    `;

                    let tiempoRestante = 5;
                    const cajaEstreno = document.getElementById('caja-estreno');
                    const contadorSpan = document.getElementById('contador-estreno');

                    const temporizador = setInterval(() => {
                        tiempoRestante--;
                        
                        if (tiempoRestante > 0) {
                            contadorSpan.textContent = tiempoRestante;
                        } else {
                            clearInterval(temporizador);
                            
                            if (enlaceVideo) {
                                cajaEstreno.innerHTML = `
                                    ✅ ¡Ya está disponible! <br>
                                    <a href="${enlaceVideo}" target="_blank" class="enlace-ver">▶ Reproducir ahora</a>
                                `;
                            } else {
                                cajaEstreno.innerHTML = `❌ El enlace de reproducción principal aún no ha sido añadido.`;
                            }
                        }
                    }, 1000);

                    if (peli.tipo === 'serie' && peli.temporadas) {
                        const seccionSeries = document.createElement('div');
                        seccionSeries.className = 'seccion-series';
                        
                        let opcionesTemporada = peli.temporadas.map(t => `<option value="${t.numero}">Temporada ${t.numero}</option>`).join('');
                        
                        seccionSeries.innerHTML = `
                            <h2>Episodios</h2>
                            <select id="selector-temporada" class="selector-temporada">
                                ${opcionesTemporada}
                            </select>
                            <div id="lista-capitulos" class="grid-capitulos"></div>
                        `;
                        
                        contenedor.appendChild(seccionSeries);

                        const selector = document.getElementById('selector-temporada');
                        const lista = document.getElementById('lista-capitulos');

                        const cargarCapitulos = (num) => {
                            const temp = peli.temporadas.find(t => t.numero == num);
                            if (temp && temp.capitulos) {
                                lista.innerHTML = temp.capitulos.map(cap => {
                                    const textoHover = cap.descripcion || cap.sinopsis || "Sin descripción disponible.";
                                    const imgMiniatura = cap.miniatura || cap.caratula || "";

                                    return `
                                    <div class="capitulo-card" onclick="reproducirCapitulo(this)">
                                        <video src="${cap.url_video || cap.video_url}" muted loop poster="${imgMiniatura}" 
                                               onmouseenter="this.play()" onmouseleave="this.pause(); this.currentTime=0;">
                                        </video>
                                        <div class="overlay-descripcion">${textoHover}</div>
                                        <div class="info-capitulo">
                                            <strong>${cap.numero}. ${cap.titulo}</strong>
                                        </div>
                                    </div>
                                    `;
                                }).join('');
                            }
                        };

                        selector.addEventListener('change', (e) => cargarCapitulos(e.target.value));
                        cargarCapitulos(peli.temporadas[0].numero); 
                    }

                } else {
                    contenedor.innerHTML = '<h2>Película o Serie no encontrada.</h2>';
                }
            })
            .catch(error => {
                console.error('Error detallado:', error);
                document.getElementById('contenido').innerHTML = '<p>Error al procesar los datos. Comprueba la consola.</p>';
            });

        function reproducirCapitulo(cardElement) {
            const video = cardElement.querySelector('video');
            if (video) {
                if (video.requestFullscreen) {
                    video.requestFullscreen();
                } else if (video.webkitRequestFullscreen) {
                    video.webkitRequestFullscreen(); 
                }
                video.muted = false; 
                video.currentTime = 0; 
                video.play();
            }
        }
    </script>
</body>
</html>
