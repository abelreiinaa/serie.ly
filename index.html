<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PELISFLIX HD</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f171e; /* Fondo oscuro principal */
            color: #fff;
        }

        /* LAYOUT PRINCIPAL PELISFLIX */
        .grid-contenedor {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }

        .cabecera {
            grid-column: 1 / -1;
            background-color: #1a242f;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #1d68b8;
        }

        .cabecera h1 {
            margin: 0;
            color: #fff;
            font-size: 1.5em;
        }

        /* BARRA LATERAL Y MENÚS */
        .barra-lateral {
            background-color: #1a242f;
            padding: 20px 0;
        }

        .barra-lateral h2 {
            padding-left: 20px;
            color: #8c9eae;
            font-size: 1.1em;
            margin-bottom: 20px;
        }

        .barra-lateral ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-principal > li > a {
            display: block;
            padding: 12px 20px;
            color: #d1d5db;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9em;
            border-bottom: 1px solid #2a3645;
        }

        .menu-principal > li > a:hover {
            background-color: #2a3645;
            color: #fff;
        }

        .sub-menu {
            display: none;
            background-color: #131b23;
        }

        .sub-menu li a {
            display: block;
            padding: 10px 15px 10px 40px;
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.85em;
            border-bottom: 1px solid #1a242f;
        }

        .sub-menu li a:hover {
            color: #fff;
        }

        .desplegable:hover .sub-menu {
            display: block;
        }

        /* CONTENIDO PRINCIPAL Y GRID DE TARJETAS */
        .contenido {
            padding: 30px;
        }

        .contenido h2 {
            margin-top: 0;
            font-size: 1.3em;
            margin-bottom: 20px;
        }

        .grid-peliculas {
            display: grid;
           grid-template-columns: repeat(4, 1fr); 
             gap: 15px;
    
        }

        /* TARJETAS DE PELÍCULAS */
        .tarjeta {
            display: block;
            border-radius: 6px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            aspect-ratio: 2 / 3; /* Proporción de póster de cine */
            background-color: #1a242f;
        }

        .tarjeta:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(0,0,0,0.8);
        }

        .tarjeta img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Hace que la imagen llene todo el espacio sin deformarse */
            display: block;
        }
    </style>
</head>
<body>

    <div class="grid-contenedor">
        <header class="cabecera">
            <h1>PELISFLIX HD</h1>
        </header>

        <div class="barra-lateral">
            <h2>Menú</h2>
            <ul class="menu-principal">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="#">SERIES</a></li>
                <li><a href="#">PELÍCULAS</a></li>

                <li class="desplegable">
                    <a href="#">GÉNEROS ▼</a>
                    <ul class="sub-menu">
                        <li><a href="#">Acción</a></li>
                        <li><a href="#">Comedia</a></li>
                        <li><a href="#">Ciencia Ficción</a></li>
                        <li><a href="#">Drama</a></li>
                        <li><a href="#">Estrenos</a></li>
                    </ul>
                </li>

                <li class="desplegable">
                    <a href="#">PRODUCTORAS ▼</a>
                    <ul class="sub-menu">
                        <li><a href="#">NETFLIX</a></li>
                        <li><a href="#">AMAZON</a></li>
                        <li><a href="#">DISNEY</a></li>
                        <li><a href="#">HBO</a></li>
                    </ul>
                </li>
            </ul>
        </div>

        <main class="contenido">
            <h2>Estrenos Online</h2>
            <div id="contenedor-peliculas" class="grid-peliculas"></div>
        </main>
    </div>

    <script>
        fetch('/api/peliculas')
            .then(respuesta => respuesta.json())
            .then(peliculas => {
                const contenedor = document.getElementById('contenedor-peliculas');

                peliculas.forEach(pelicula => {
                    const enlace = document.createElement('a');
                    enlace.href = `detalle.html?titulo=${encodeURIComponent(pelicula.titulo)}`;
                    enlace.classList.add('tarjeta');

                    enlace.innerHTML = `
                        <img src="${pelicula.caratula}" alt="${pelicula.titulo}">
                    `;

                    contenedor.appendChild(enlace);
                });
            })
            .catch(error => {
                console.error('Error en la carga de datos:', error);
                document.getElementById('contenedor-peliculas').innerHTML = '<p style="color:red;">Error al cargar los datos. Asegúrate de estar usando Live Server.</p>';
            });
    </script>
</body>
</html>
