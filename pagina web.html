<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PELISFLIX HD</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f171e;
            color: #fff;
        }

        /* CONFIGURACIÓN DEL LAYOUT PRINCIPAL PELISFLIX */
        .grid-contenedor {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
            min-height: 100vh;
        }

        .cabecera {
            grid-column: 1 / -1;
            background-color: #1a242f;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #1d68b8;
        }

        .cabecera h1 {
            margin: 0;
            color: #fff;
        }

        /* ESTILOS DE NAVEGACIÓN Y MENÚS DESPLEGABLES */
        .barra-lateral {
            background-color: #1a242f;
            padding: 20px 0;
        }

        .barra-lateral h2 {
            padding-left: 20px;
            color: #8c9eae;
        }

        .barra-lateral ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-principal>li>a {
            display: block;
            padding: 12px 20px;
            color: #d1d5db;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px solid #2a3645;
        }

        .menu-principal>li>a:hover {
            background-color: #2a3645;
            color: #fff;
        }

        .sub-menu {
            display: none;
            background-color: #131b23;
        }

        .sub-menu li a {
            display: block;
            padding: 10px 15px 10px 40px;
            color: #9ca3af;
            text-decoration: none;
            font-size: 0.9em;
            border-bottom: 1px solid #1a242f;
        }

        .sub-menu li a:hover {
            color: #fff;
        }

        .desplegable:hover .sub-menu {
            display: block;
        }

        /* GRID DE ESTRENOS ONLINE */
        .contenido {
            padding: 20px;
        }

        .grid-peliculas {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        /* TARJETA DE PELÍCULA Y EFECTO DE CAPA SUPERPUESTA */
        .tarjeta-pelicula {
            width: 100%;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            background-color: #000;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .tarjeta-pelicula img {
            width: 100%;
            aspect-ratio: 2 / 3;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .tarjeta-pelicula:hover img {
            opacity: 0.3;
            transform: scale(1.05);
        }

        .detalles-pelicula {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(9, 14, 23, 0.85);
            color: white;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease-in-out;
            font-size: 0.85em;
            overflow-y: auto;
        }

        .tarjeta-pelicula:hover .detalles-pelicula,
        .detalles-pelicula.mostrar {
            opacity: 1;
            visibility: visible;
        }

        .detalles-pelicula h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 1.3em;
            color: #fff;
            text-align: center;
        }

        .detalles-pelicula p {
            margin: 5px 0;
            line-height: 1.4;
            color: #d1d5db;
        }

        .detalles-pelicula p strong {
            color: #fff;
        }

        .sinopsis-texto {
            margin-top: 10px !important;
            font-size: 0.9em;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-ver {
            display: block;
            margin-top: auto;
            padding: 10px;
            background-color: #1d68b8;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            text-align: center;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        .btn-ver:hover {
            background-color: #15508f;
        }

        .pie-pagina {
            grid-column: 1 / -1;
            background-color: #131b23;
            color: #8c9eae;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #2a3645;
        }
    </style>
</head>

<body>

    <div class="grid-contenedor">
        <header class="cabecera">
            <h1>PELISFLIX HD</h1>
        </header>

        <div class="barra-lateral">
            <h2>Menú</h2>
            <ul class="menu-principal">
                <li><a href="#">Inicio</a></li>
                <li><a href="#">SERIES</a></li>
                <li><a href="#">PELÍCULAS</a></li>

                <li class="desplegable">
                    <a href="#">GÉNEROS ▼</a>
                    <ul class="sub-menu">
                        <li><a href="#">Acción</a></li>
                        <li><a href="#">Comedia</a></li>
                        <li><a href="#">Ciencia Ficción</a></li>
                        <li><a href="#">Drama</a></li>
                        <li><a href="#">Estrenos</a></li>
                    </ul>
                </li>

                <li class="desplegable">
                    <a href="#">PRODUCTORAS ▼</a>
                    <ul class="sub-menu">
                        <li><a href="#">NETFLIX</a></li>
                        <li><a href="#">AMAZON</a></li>
                        <li><a href="#">DISNEY</a></li>
                        <li><a href="#">HBO</a></li>
                    </ul>
                </li>
            </ul>
        </div>

        <main class="contenido">
            <h2>Estrenos Online</h2>
            <div id="contenedor-peliculas" class="grid-peliculas"></div>
        </main>

        <footer class="pie-pagina">
            <p>PELISFLIX HD - Tu destino para las mejores películas</p>
        </footer>
    </div>

    <script>
        fetch('peliculas.json')
            .then(respuesta => respuesta.json())
            .then(peliculas => {
                const contenedor = document.getElementById('contenedor-peliculas');

                peliculas.forEach(pelicula => {
                    const tarjeta = document.createElement('div');
                    tarjeta.classList.add('tarjeta-pelicula');

                    tarjeta.innerHTML = `
                        <img src="${pelicula.caratula}" alt="Carátula de ${pelicula.titulo}" class="foto-clic">
                        <div class="detalles-pelicula">
                            <h3>${pelicula.titulo}</h3>
                            <p><strong>Director:</strong> ${pelicula.director}</p>
                            <p><strong>Género:</strong> ${pelicula.genero}</p>
                            <p><strong>Actores:</strong> ${pelicula.actores}</p>
                            <p><strong>Duración:</strong> ${pelicula.duracion}</p>
                            <p class="sinopsis-texto"><strong>Sinopsis:</strong> ${pelicula.sinopsis}</p>
                            <a href="${pelicula.trailer}" target="_blank" class="btn-ver">▶ VER ONLINE</a>
                        </div>
                    `;

                    contenedor.appendChild(tarjeta);

                    const imagen = tarjeta.querySelector('.foto-clic');
                    const detalles = tarjeta.querySelector('.detalles-pelicula');

                    imagen.addEventListener('click', () => {
                        document.querySelectorAll('.detalles-pelicula.mostrar').forEach(el => {
                            if (el !== detalles) el.classList.remove('mostrar');
                        });

                        detalles.classList.toggle('mostrar');
                    });
                });
            })
            .catch(error => {
                console.error('Error en la carga de datos:', error);
                document.getElementById('contenedor-peliculas').innerHTML = '<p style="color:red;">Error: No se pudo cargar peliculas.json. Verifica el servidor local.</p>';
            });
    </script>
</body>

</html>
